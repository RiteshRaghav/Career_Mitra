spring.application.name=career-mitra-backend
server.port=${PORT:8080}
spring.profiles.active=mysql

# Default: MySQL (persistent) configuration — uses Hibernate (JPA)
# Values read from environment variables with sensible defaults.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/careermitra?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 console disabled by default; enable H2 profile for in-memory dev

# Logging
logging.level.root=INFO
logging.level.com.careermitra=DEBUG

# JWT Configuration
jwt.secret=careermitrasecretkey2024verylongandsecurekeyforproductionanditshouldbeatleast512bitslong
jwt.expiration=86400000

# CORS Configuration
app.cors.allowedOrigins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# File Upload
app.file.upload-dir=uploads

# Multipart Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mail Sending Configurations
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Email API Configurations
app.mail.sender-email=${SENDER_EMAIL:no-reply@careermitra.com}
app.mail.sendgrid-api-key=${SENDGRID_API_KEY:}
app.mail.brevo-api-key=${BREVO_API_KEY:}

# Frontend Configuration
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Profiles available:
# - default (MySQL): uses the settings above
# - mysql: same as default (alternate file at application-mysql.properties)
# - h2: in-memory H2 quick dev profile (activate with SPRING_PROFILES_ACTIVE=h2)
