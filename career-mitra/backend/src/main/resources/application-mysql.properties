# MySQL configuration for Career Mitra
# Activate with: export SPRING_PROFILES_ACTIVE=mysql

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/careermitra?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:careermitra_user}
spring.datasource.password=${DB_PASS:change_me_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection pool (HikariCP settings)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# File Upload (same as default)
app.file.upload-dir=uploads
